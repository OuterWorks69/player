<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Player</title>
	<style>
		html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
		#player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
		#unmute {
			position: absolute; top: 0; left: 0; width: 100%; height: 100%;
			z-index: 10; background: transparent; cursor: pointer;
		}
	</style>
</head>
<body>
	<div id="player"></div>
	<!-- Invisible overlay. The first click anywhere lands here (a "user
	     gesture"), which lets us unmute. The game sends that click
	     automatically once we signal #ready via the URL hash. -->
	<div id="unmute"></div>
	<script>
		// Reads ?v=VIDEOID&t=SECONDS from the URL. Autoplays MUTED (always
		// allowed by autoplay policy), then unmutes on first click.
		// Protocol with the game:
		//   #ready -> page is playing muted, please send a click
		//   #sound -> unmuted, all good
		const params = new URLSearchParams( location.search );
		const videoId = params.get( "v" );
		const start = parseInt( params.get( "t" ) || "0", 10 );

		let player = null;
		let unmuted = false;

		const tag = document.createElement( "script" );
		tag.src = "https://www.youtube.com/iframe_api";
		document.head.appendChild( tag );

		window.onYouTubeIframeAPIReady = function ()
		{
			player = new YT.Player( "player", {
				videoId: videoId,
				playerVars: {
					autoplay: 1,
					mute: 1,
					start: start,
					rel: 0,
					controls: 1,
					playsinline: 1,
					iv_load_policy: 3,
				},
				events: {
					onReady: function ( e )
					{
						e.target.mute();
						e.target.playVideo();
					},
					onStateChange: function ( e )
					{
						// Playing muted and still waiting for our gesture —
						// tell the game we're ready for the synthetic click.
						if ( e.data === YT.PlayerState.PLAYING && !unmuted )
						{
							location.hash = "ready";
						}

						if ( e.data === YT.PlayerState.CUED )
						{
							e.target.playVideo();
						}
					}
				}
			} );
		};

		document.getElementById( "unmute" ).addEventListener( "pointerdown", function ()
		{
			if ( !player ) return;

			player.unMute();
			player.setVolume( 100 );
			player.playVideo();

			unmuted = true;
			location.hash = "sound";

			// Remove the overlay so future clicks reach the player controls.
			this.remove();
		} );
	</script>
</body>
</html>
